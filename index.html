<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilot Currency Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 24px;
      color: #222;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .top-card-inner {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    .top-card-left {
      flex: 1;
      min-width: 0;
    }

    .top-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .logo {
      height: 42px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: end;
    }

    .field {
      flex: 1;
      min-width: 220px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #555;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #cfd8e3;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #1f6feb;
      color: white;
    }

    button.secondary {
      background: #0f9d58;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px 14px;
      align-items: start;
    }

    .col-header {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .night-header {
      color: #1f6feb;
    }

    .input-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-box {
      background: #f8fbff;
      border: 1px solid #d6e7ff;
      border-radius: 10px;
      padding: 16px;
      line-height: 1.9;
      font-size: 15px;
      overflow-wrap: anywhere;
      word-break: keep-all;
    }

    .muted {
      color: #666;
      font-size: 13px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .ok { color: #0f9d58; }
    .err { color: #d93025; }

    .result-line {
      margin-bottom: 6px;
    }

    .due-date-value {
      color: #7b2cff;
      font-weight: 700;
      text-decoration: underline;
    }

    /* DUE DATE 색상 조건 */
    .due-date-red {
      color: #d93025 !important;
    }

    .due-date-orange {
      color: #f59e0b !important;
    }

    .night-value {
      color: #1f6feb;
      font-weight: normal;
    }

    .night-input.has-value {
      color: #1f6feb;
      font-weight: 600;
    }

    .top-info-box {
      min-width: 460px;
      max-width: 520px;
      background: #f8fbff;
      border: 1px solid #d6e7ff;
      border-radius: 24px;
      padding: 14px 18px;
      box-sizing: border-box;
      overflow-x: auto;
      font-size: clamp(9px, 2.6vw, 13px);
    }

    .top-info-loading {
      color: #666;
      font-size: 13px;
    }

    .top-info-title {
      color: #7b2cff;
      font-weight: 700;
      font-size: inherit;
      margin-bottom: 6px;
      white-space: nowrap;
    }

    .top-info-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
      font-size: inherit;
    }

    .top-info-table td {
      padding: 4px 3px;
      vertical-align: top;
      border-bottom: 1px solid #e8f0fb;
      white-space: nowrap;
    }

    .top-info-label {
      width: 90px;
      min-width: 90px;
      font-weight: 700;
      color: #7b2cff;
      white-space: nowrap;
    }

    .top-info-mid {
      width: 140px;
      min-width: 140px;
      color: #7b2cff;
      white-space: nowrap;
      font-weight: 700;
    }

    .top-info-value {
      color: #7b2cff;
      white-space: nowrap;
    }

    .search-status-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-status-row .status {
      margin-top: 0;
    }

    .retry-btn {
      padding: 7px 12px;
      font-size: 13px;
      line-height: 1;
      border-radius: 999px;
      background: #f59e0b;
      color: #fff;
      display: none;
    }

    .retry-btn:hover {
      background: #d97706;
    }

    @media (max-width: 768px) {
      .input-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .top-card-inner {
        flex-direction: column;
      }

      .top-brand {
        flex-direction: column;
        align-items: flex-start;
      }

      .top-info-box {
        min-width: 100%;
        max-width: 100%;
        border-radius: 16px;
        padding: 10px 12px;
        font-size: clamp(8px, 2.9vw, 12px);
      }
    }

    @media (max-width: 480px) {
      .result-box {
        font-size: 14px;
        line-height: 1.7;
      }

      .status {
        font-size: 13px;
      }

      .input-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        column-gap: 26px;
        row-gap: 14px;
        align-items: start;
      }

      .input-col {
        min-width: 0;
        gap: 8px;
      }

      .col-header {
        font-size: 13px;
        margin-bottom: 2px;
      }

      .input-col input {
        width: 100%;
        min-width: 0;
        padding: 6px 6px;
        font-size: 13px;
      }

      body {
        padding: 14px;
      }

      .search-status-row {
        gap: 8px;
      }

      .retry-btn {
        padding: 6px 10px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top-card-inner">
        <div class="top-card-left">
          <div class="top-brand">
            <img src="./SK_LOGO.png" alt="SK Logo" class="logo">
            <h1>Pilot Currency Checker</h1>
          </div>
          <div class="muted">
            Select a pilot, enter the values, and click the "Calculate" button to update the results.
          </div>
        </div>

        <div class="top-info-box" id="topInfoBox">
          <div class="top-info-loading">Loading...</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>1. Pilot Search</h2>
      <div class="row">
        <div class="field">
          <select id="pilotSelect" onchange="handlePilotChange()">
            <option value="">Loading pilot list...</option>
          </select>
        </div>
      </div>

      <div class="search-status-row">
        <div id="searchStatus" class="status"></div>
        <button type="button" id="retrySearchBtn" class="retry-btn" onclick="retryPilotSearch()">
          Retry
        </button>
      </div>
    </div>

    <div class="card">
      <h2>2. Input Values</h2>
      <div class="muted" style="margin-bottom:10px;"></div>

      <div class="input-grid" id="inputGrid"></div>

      <div class="row" style="margin-top:16px;">
        <button class="secondary" id="btnCalc" onclick="calculateData()">Calculate</button>
      </div>

      <div id="calcStatus" class="status"></div>
    </div>

    <div class="card">
      <h2>3. Results</h2>
      <div id="result" class="result-box">Search results will be displayed here.</div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyDbsxDLaIZ44CkY_s25CpSmzSeOMQlR6GhmDyvsPhJQVf5RBSHLfs4rTejlC3Va2Ug0Q/exec";

    const headers = [
      { key: "P", title: "T/O-Day", night: false },
      { key: "Q", title: "T/O-Night", night: true },
      { key: "R", title: "L/D-Day", night: false },
      { key: "S", title: "L/D-Night", night: true }
    ];

    function buildInputGrid() {
      const grid = document.getElementById("inputGrid");
      grid.innerHTML = "";

      headers.forEach(h => {
        const col = document.createElement("div");
        col.className = "input-col";

        const head = document.createElement("div");
        head.className = "col-header" + (h.night ? " night-header" : "");
        head.textContent = h.title;
        col.appendChild(head);

        for (let r = 2; r <= 4; r++) {
          const input = document.createElement("input");
          input.type = "date";
          input.id = `cell_${h.key}${r}`;

          if (h.night) {
            input.classList.add("night-input");
          }

          input.addEventListener("change", function () {
            if (input.classList.contains("night-input")) {
              if (input.value) {
                input.classList.add("has-value");
              } else {
                input.classList.remove("has-value");
              }
            }
          });

          col.appendChild(input);
        }

        grid.appendChild(col);
      });
    }

    function getInputValues() {
      const values = [];
      for (let r = 2; r <= 4; r++) {
        const row = [];
        for (const col of ["P", "Q", "R", "S"]) {
          row.push(document.getElementById(`cell_${col}${r}`).value.trim());
        }
        values.push(row);
      }
      return values;
    }

    function setInputValues(values) {
      clearInputFields();

      if (!Array.isArray(values)) return;

      for (let r = 0; r < values.length; r++) {
        for (let c = 0; c < values[r].length; c++) {
          const col = ["P", "Q", "R", "S"][c];
          const rowNo = r + 2;
          const el = document.getElementById(`cell_${col}${rowNo}`);
          if (el) {
            el.value = values[r][c] ?? "";

            if (el.classList.contains("night-input")) {
              if (el.value) {
                el.classList.add("has-value");
              } else {
                el.classList.remove("has-value");
              }
            }
          }
        }
      }
    }

    function clearInputFields() {
      for (let r = 2; r <= 4; r++) {
        for (const col of ["P", "Q", "R", "S"]) {
          const el = document.getElementById(`cell_${col}${r}`);
          if (el) {
            el.value = "";
            el.classList.remove("has-value");
          }
        }
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function styleDateList(values, className = "") {
      return (values || [])
        .map(v => `<span class="${className}">${escapeHtml(v)}</span>`)
        .join(" / ");
    }

    function getTodayKSTDateOnly() {
      const now = new Date();

      const kst = new Date(
        now.toLocaleString("en-US", {
          timeZone: "Asia/Seoul"
        })
      );

      return new Date(kst.getFullYear(), kst.getMonth(), kst.getDate());
    }

    function getDueDateClass(dueDateStr) {
      if (!dueDateStr) return "";

      const parts = String(dueDateStr).split("-");
      if (parts.length !== 3) return "";

      const y = Number(parts[0]);
      const m = Number(parts[1]) - 1;
      const d = Number(parts[2]);

      if (!y || isNaN(m) || !d) return "";

      const dueDate = new Date(y, m, d);
      const today = getTodayKSTDateOnly();

      const diffDays = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));

      // 해당 날짜 - 오늘 <= 7 : 빨강
      if (diffDays <= 7) {
        return "due-date-red";
      }

      // 7 < 해당 날짜 - 오늘 <= 14 : 주황
      if (diffDays > 7 && diffDays <= 14) {
        return "due-date-orange";
      }

      return "";
    }

    function renderResult(data) {
      const result = document.getElementById("result");

      const dayTO = styleDateList(data.dayTO || []);
      const nightTO = styleDateList(data.nightTO || [], "night-value");
      const dayLD = styleDateList(data.dayLD || []);
      const nightLD = styleDateList(data.nightLD || [], "night-value");
      const dueDateClass = getDueDateClass(data.dueDateMain);

      result.innerHTML = `
        <div class="result-line">
          🧑‍✈️ <strong>PILOT:</strong> ${escapeHtml(data.pilotDisplay || "")}
        </div>
        <div class="result-line">
          ✈️ <strong>DUE DATE:</strong>
          <span class="due-date-value ${dueDateClass}">
            ${escapeHtml(data.dueDateMain || "")} (${escapeHtml(data.dueDateSub || "")})
          </span>
        </div>
        <div class="result-line">
          <strong>-DAY T/O:</strong><br>
          ${dayTO}
        </div>
        <div class="result-line">
          <strong>-NIGHT T/O:</strong><br>
          ${nightTO}
        </div>
        <div class="result-line">
          <strong>-DAY L/D:</strong><br>
          ${dayLD}
        </div>
        <div class="result-line">
          <strong>-NIGHT L/D:</strong><br>
          ${nightLD}
        </div>
      `;
    }

    function renderTopInfo(values) {
      const box = document.getElementById("topInfoBox");

      if (!Array.isArray(values) || values.length === 0) {
        box.innerHTML = `<div class="top-info-loading">No data</div>`;
        return;
      }

      let html = `<div class="top-info-title">Updated upto~</div>`;
      html += `<table class="top-info-table">`;

      values.forEach(row => {
        const c1 = row[0] ?? "";
        const c2 = row[1] ?? "";

        html += `
          <tr>
            <td class="top-info-label">✈️&nbsp;${escapeHtml(c1)}</td>
            <td class="top-info-value">${escapeHtml(c2)}</td>
          </tr>
        `;
      });

      html += `</table>`;
      box.innerHTML = html;
    }

    function setRetryButton(visible) {
      const btn = document.getElementById("retrySearchBtn");
      btn.style.display = visible ? "inline-flex" : "none";
      btn.disabled = false;
    }

    async function callApi(payload) {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();

      let json;
      try {
        json = JSON.parse(text);
      } catch (e) {
        throw new Error("The server response is not in JSON format.");
      }

      if (!json.success) {
        const rawMessage = json.message || "";

        if (rawMessage.includes("다른 사용자") || rawMessage.includes("계산 중")) {
          throw new Error("Another user is currently running a calculation. Please try again in a moment.");
        }

        throw new Error(rawMessage || "An error occurred while processing the request.");
      }

      return json;
    }

    async function loadPilotList() {
      const select = document.getElementById("pilotSelect");
      const status = document.getElementById("searchStatus");

      try {
        setRetryButton(false);
        status.className = "status";
        status.textContent = "Loading pilot list...";

        const result = await callApi({
          action: "getPilots"
        });

        const pilots = result.pilots || [];
        select.innerHTML = '<option value="">Please select</option>';

        pilots.forEach(name => {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          select.appendChild(opt);
        });

        status.className = "status ok";
        status.textContent = "Pilot list loaded successfully.";
      } catch (err) {
        select.innerHTML = '<option value="">Failed to load list</option>';
        status.className = "status err";
        status.textContent = err.message;
      }
    }

    async function loadTopInfo() {
      try {
        const result = await callApi({
          action: "getTopInfo"
        });

        renderTopInfo(result.values || []);
      } catch (err) {
        document.getElementById("topInfoBox").innerHTML =
          `<div class="top-info-loading">${escapeHtml(err.message)}</div>`;
      }
    }

    async function resetInputsOnSheet() {
      try {
        await callApi({
          action: "resetInputs"
        });
      } catch (err) {
        console.error("resetInputs error:", err);
      }
    }

    async function retryPilotSearch() {
      const pilotName = document.getElementById("pilotSelect").value;
      const status = document.getElementById("searchStatus");
      const btn = document.getElementById("retrySearchBtn");

      if (!pilotName) return;

      btn.disabled = true;
      status.className = "status";
      status.textContent = "Retrying...";

      await handlePilotChange(true);
    }

    async function handlePilotChange(isRetry = false) {
      const pilotName = document.getElementById("pilotSelect").value;
      const status = document.getElementById("searchStatus");

      if (!pilotName) {
        clearInputFields();
        document.getElementById("result").textContent = "Search results will be displayed here.";
        status.className = "status";
        status.textContent = "";
        setRetryButton(false);
        return;
      }

      try {
        setRetryButton(false);
        status.className = "status";
        status.textContent = isRetry ? "Retrying..." : "Searching...";

        clearInputFields();

        const result = await callApi({
          action: "search",
          pilotName
        });

        renderResult(result.data);
        setInputValues(result.data.inputValues || []);

        status.className = "status ok";
        status.textContent = "Search completed.";
        setRetryButton(false);
      } catch (err) {
        status.className = "status err";
        status.textContent = err.message || "Load fail";

        if (pilotName) {
          setRetryButton(true);
        }
      }
    }

    async function calculateData() {
      const pilotName = document.getElementById("pilotSelect").value;
      const status = document.getElementById("calcStatus");

      if (!pilotName) {
        status.className = "status err";
        status.textContent = "Please select a pilot first.";
        return;
      }

      try {
        document.getElementById("btnCalc").disabled = true;
        status.className = "status";
        status.textContent = "Calculating...";

        const inputValues = getInputValues();

        const result = await callApi({
          action: "calculate",
          pilotName,
          inputValues
        });

        renderResult(result.data);

        status.className = "status ok";
        status.textContent = "Calculation completed.";
      } catch (err) {
        status.className = "status err";
        status.textContent = err.message;
      } finally {
        document.getElementById("btnCalc").disabled = false;
      }
    }

    window.addEventListener("beforeunload", function () {
      navigator.sendBeacon(
        API_URL,
        new Blob([JSON.stringify({ action: "resetInputs" })], {
          type: "text/plain;charset=utf-8"
        })
      );
    });

    buildInputGrid();
    clearInputFields();
    loadPilotList();
    loadTopInfo();
    resetInputsOnSheet();
  </script>
</body>
</html>
