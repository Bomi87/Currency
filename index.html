<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilot Currency Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 24px;
      color: #222;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .top-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .logo {
      height: 42px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: end;
    }

    .field {
      flex: 1;
      min-width: 220px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #555;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #cfd8e3;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #1f6feb;
      color: white;
    }

    button.secondary {
      background: #0f9d58;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px 14px;
      align-items: start;
    }

    .col-header {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .night-header {
      color: #1f6feb;
    }

    .input-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-box {
      background: #f8fbff;
      border: 1px solid #d6e7ff;
      border-radius: 10px;
      padding: 16px;
      line-height: 1.9;
      font-size: 15px;
    }

    .result-box {
  overflow-wrap: anywhere;
  word-break: keep-all;
}

.result-top {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 10px;
  align-items: baseline;
}
    .muted {
      color: #666;
      font-size: 13px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .ok { color: #0f9d58; }
    .err { color: #d93025; }

    .result-line {
      margin-bottom: 6px;
    }

    .due-date-value {
      color: #7b2cff;
      font-weight: 700;
      text-decoration: underline;
    }

 .night-value {
  color: #1f6feb;
  font-weight: normal;
}

    @media (max-width: 768px) {
      .input-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .top-brand {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 480px) {
      .result-box {
  font-size: 14px;
  line-height: 1.7;
}
      .input-grid {
        grid-template-columns: 1fr;
      }

      body {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top-brand">
        <img src="./SK_LOGO.png" alt="SK Logo" class="logo">
        <h1>Pilot Currency Checker</h1>
      </div>
      <div class="muted">
        PILOT 선택 후, 입력값을 넣은 뒤 계산하면 결과가 갱신됩니다.
      </div>
    </div>

    <div class="card">
      <h2>1. PILOT 조회</h2>
      <div class="row">
        <div class="field">
    
          <select id="pilotSelect" onchange="handlePilotChange()">
            <option value="">목록 불러오는 중...</option>
          </select>
        </div>
      </div>
      <div id="searchStatus" class="status"></div>
    </div>

    <div class="card">
      <h2>2. 입력값</h2>
      <div class="muted" style="margin-bottom:10px;">
       
      </div>

      <div class="input-grid" id="inputGrid"></div>

      <div class="row" style="margin-top:16px;">
        <button class="secondary" id="btnCalc" onclick="calculateData()">계산</button>
      </div>

      <div id="calcStatus" class="status"></div>
    </div>

    <div class="card">
      <h2>3. 결과</h2>
      <div id="result" class="result-box">조회 결과가 여기에 표시됩니다.</div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxv8Y3yndEmqYb-51-LKeXEdIAdTNOafem6WCvD3XpXFOXilrML5xgYvkQUKSKHkFHtpg/exec";

    const headers = [
      { key: "P", title: "T/O-Day", night: false },
      { key: "Q", title: "T/O-Night", night: true },
      { key: "R", title: "L/D-Day", night: false },
      { key: "S", title: "L/D-Night", night: true }
    ];

    function buildInputGrid() {
      const grid = document.getElementById("inputGrid");
      grid.innerHTML = "";

      headers.forEach(h => {
        const col = document.createElement("div");
        col.className = "input-col";

        const head = document.createElement("div");
        head.className = "col-header" + (h.night ? " night-header" : "");
        head.textContent = h.title;
        col.appendChild(head);

        for (let r = 2; r <= 4; r++) {
          const input = document.createElement("input");
         input.type = "date";
          input.id = `cell_${h.key}${r}`;
          input.placeholder = "";
          col.appendChild(input);
        }

        grid.appendChild(col);
      });
    }

    function getInputValues() {
      const values = [];
      for (let r = 2; r <= 4; r++) {
        const row = [];
        for (const col of ["P", "Q", "R", "S"]) {
          row.push(document.getElementById(`cell_${col}${r}`).value.trim());
        }
        values.push(row);
      }
      return values;
    }

    function setInputValues(values) {
      clearInputFields();

      if (!Array.isArray(values)) return;

      for (let r = 0; r < values.length; r++) {
        for (let c = 0; c < values[r].length; c++) {
          const col = ["P", "Q", "R", "S"][c];
          const rowNo = r + 2;
          const el = document.getElementById(`cell_${col}${rowNo}`);
          if (el) el.value = values[r][c] ?? "";
        }
      }
    }

    function clearInputFields() {
      for (let r = 2; r <= 4; r++) {
        for (const col of ["P", "Q", "R", "S"]) {
          const el = document.getElementById(`cell_${col}${r}`);
          if (el) el.value = "";
        }
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function styleDateList(values, className = "") {
      return (values || [])
        .map(v => `<span class="${className}">${escapeHtml(v)}</span>`)
        .join(" / ");
    }

    function renderResult(data) {
      const result = document.getElementById("result");

      const dayTO = styleDateList(data.dayTO || []);
      const nightTO = styleDateList(data.nightTO || [], "night-value");
      const dayLD = styleDateList(data.dayLD || []);
      const nightLD = styleDateList(data.nightLD || [], "night-value");

      result.innerHTML = `
    <div class="result-line">
  <strong>PILOT:</strong> ${escapeHtml(data.pilotDisplay || "")}
  &nbsp;&nbsp;&nbsp;/&nbsp;&nbsp;&nbsp;
  <strong>DUE DATE:</strong>
  <span class="due-date-value">
    ${escapeHtml(data.dueDateMain || "")} (${escapeHtml(data.dueDateSub || "")})
  </span>
</div>
        <div class="result-line"><strong>-DAY T/O:</strong> ${dayTO}</div>
        <div class="result-line"><strong>-NIGHT T/O:</strong> ${nightTO}</div>
        <div class="result-line"><strong>-DAY L/D:</strong> ${dayLD}</div>
        <div class="result-line"><strong>-NIGHT L/D:</strong> ${nightLD}</div>
      `;
    }

    async function callApi(payload) {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();

      let json;
      try {
        json = JSON.parse(text);
      } catch (e) {
        throw new Error("서버 응답이 JSON 형식이 아닙니다.");
      }

      if (!json.success) {
        throw new Error(json.message || "처리 중 오류가 발생했습니다.");
      }

      return json;
    }

    async function loadPilotList() {
      const select = document.getElementById("pilotSelect");
      const status = document.getElementById("searchStatus");

      try {
        status.className = "status";
        status.textContent = "PILOT 목록 불러오는 중...";

        const result = await callApi({
          action: "getPilots"
        });

        const pilots = result.pilots || [];
        select.innerHTML = '<option value="">선택하세요</option>';

        pilots.forEach(name => {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          select.appendChild(opt);
        });

        status.className = "status ok";
        status.textContent = "PILOT 목록 로드 완료";
      } catch (err) {
        select.innerHTML = '<option value="">목록 불러오기 실패</option>';
        status.className = "status err";
        status.textContent = err.message;
      }
    }

    async function resetInputsOnSheet() {
      try {
        await callApi({
          action: "resetInputs"
        });
      } catch (err) {
        console.error("resetInputs 오류:", err);
      }
    }

    async function handlePilotChange() {
      const pilotName = document.getElementById("pilotSelect").value;
      const status = document.getElementById("searchStatus");

      if (!pilotName) {
        clearInputFields();
        document.getElementById("result").textContent = "조회 결과가 여기에 표시됩니다.";
        status.className = "status";
        status.textContent = "";
        return;
      }

      try {
        status.className = "status";
        status.textContent = "조회 중...";

        clearInputFields();

        const result = await callApi({
          action: "search",
          pilotName
        });

        renderResult(result.data);
        setInputValues(result.data.inputValues || []);

        status.className = "status ok";
        status.textContent = "조회 완료";
      } catch (err) {
        status.className = "status err";
        status.textContent = err.message;
      }
    }

    async function calculateData() {
      const pilotName = document.getElementById("pilotSelect").value;
      const status = document.getElementById("calcStatus");

      if (!pilotName) {
        status.className = "status err";
        status.textContent = "먼저 PILOT을 선택하세요.";
        return;
      }

      try {
        document.getElementById("btnCalc").disabled = true;
        status.className = "status";
        status.textContent = "계산 중...";

        const inputValues = getInputValues();

        const result = await callApi({
          action: "calculate",
          pilotName,
          inputValues
        });

        renderResult(result.data);

        status.className = "status ok";
        status.textContent = "계산 완료";
      } catch (err) {
        status.className = "status err";
        status.textContent = err.message;
      } finally {
        document.getElementById("btnCalc").disabled = false;
      }
    }

    window.addEventListener("beforeunload", function () {
      navigator.sendBeacon(
        API_URL,
        new Blob([JSON.stringify({ action: "resetInputs" })], {
          type: "text/plain;charset=utf-8"
        })
      );
    });

    buildInputGrid();
    clearInputFields();
    loadPilotList();
    resetInputsOnSheet();
  </script>
</body>
</html>
