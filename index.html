<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilot Currency Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 24px;
      color: #222;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: end;
    }

    .field {
      flex: 1;
      min-width: 220px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #555;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #cfd8e3;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #1f6feb;
      color: white;
    }

    button.secondary {
      background: #0f9d58;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .grid8 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .result-box {
      background: #f8fbff;
      border: 1px solid #d6e7ff;
      border-radius: 10px;
      padding: 16px;
      line-height: 1.9;
      font-size: 15px;
    }

    .muted {
      color: #666;
      font-size: 13px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .ok { color: #0f9d58; }
    .err { color: #d93025; }

    .result-line {
      margin-bottom: 6px;
    }

    @media (max-width: 768px) {
      .grid8 {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .grid8 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Pilot Currency Checker</h1>
      <div class="muted">
        조종사 선택 후 조회하고, L2:O9 값을 입력한 뒤 계산하면 결과가 갱신됩니다.
      </div>
    </div>

    <div class="card">
      <h2>1. 조종사 조회</h2>
      <div class="row">
        <div class="field">
          <label for="pilotSelect">조종사 이름</label>
          <select id="pilotSelect">
            <option value="">목록 불러오는 중...</option>
          </select>
        </div>
        <div>
          <button id="btnSearch" onclick="searchPilot()">조회</button>
        </div>
      </div>
      <div id="searchStatus" class="status"></div>
    </div>

    <div class="card">
      <h2>2. 입력값 (L2:O9)</h2>
      <div class="muted" style="margin-bottom:10px;">
        아래 값은 구글시트의 L2:O9에 그대로 입력됩니다.
      </div>
      <div class="grid8" id="inputGrid"></div>
      <div class="row" style="margin-top:16px;">
        <button class="secondary" id="btnCalc" onclick="calculateData()">계산</button>
      </div>
      <div id="calcStatus" class="status"></div>
    </div>

    <div class="card">
      <h2>3. 결과</h2>
      <div id="result" class="result-box">조회 결과가 여기에 표시됩니다.</div>
    </div>
  </div>

  <script>
    // 본인 Apps Script 웹앱 URL로 교체
  const API_URL = "https://script.google.com/macros/s/AKfycbwBUy069fercilRiONLiKiR0HTSBImuBYSUt0BltCVfR2L4wouXOs58YO89LozPCehOdw/exec";

    function buildInputGrid() {
      const grid = document.getElementById("inputGrid");
      grid.innerHTML = "";

      for (let r = 2; r <= 9; r++) {
        for (const col of ["L", "M", "N", "O"]) {
          const cellName = col + r;

          const wrap = document.createElement("div");
          wrap.className = "field";
          wrap.innerHTML = `
            <label for="cell_${cellName}">${cellName}</label>
            <input type="text" id="cell_${cellName}" placeholder="${cellName}" />
          `;
          grid.appendChild(wrap);
        }
      }
    }

    function getInputValues() {
      const values = [];
      for (let r = 2; r <= 9; r++) {
        const row = [];
        for (const col of ["L", "M", "N", "O"]) {
          row.push(document.getElementById(`cell_${col}${r}`).value.trim());
        }
        values.push(row);
      }
      return values;
    }

    function setInputValues(values) {
      if (!Array.isArray(values)) return;

      for (let r = 0; r < values.length; r++) {
        for (let c = 0; c < values[r].length; c++) {
          const col = ["L", "M", "N", "O"][c];
          const rowNo = r + 2;
          const el = document.getElementById(`cell_${col}${rowNo}`);
          if (el) el.value = values[r][c] ?? "";
        }
      }
    }

    function renderResult(data) {
      const result = document.getElementById("result");

      result.innerHTML = `
        <div class="result-line"><strong>조종사 이름:</strong> ${data.pilotDisplay || ""}</div>
        <div class="result-line"><strong>DAY T/O:</strong> ${(data.dayTO || []).join(", ")}</div>
        <div class="result-line"><strong>NIGHT T/O:</strong> ${(data.nightTO || []).join(", ")}</div>
        <div class="result-line"><strong>DAY L/D:</strong> ${(data.dayLD || []).join(", ")}</div>
        <div class="result-line"><strong>NIGHT L/D:</strong> ${(data.nightLD || []).join(", ")}</div>
        <div class="result-line"><strong>DUE DATE:</strong> ${data.dueDateMain || ""} (${data.dueDateSub || ""})</div>
      `;
    }

    async function callApi(payload) {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();

      let json;
      try {
        json = JSON.parse(text);
      } catch (e) {
        throw new Error("서버 응답이 JSON 형식이 아닙니다.");
      }

      if (!json.success) {
        throw new Error(json.message || "처리 중 오류가 발생했습니다.");
      }

      return json;
    }

    async function loadPilotList() {
      const select = document.getElementById("pilotSelect");
      const status = document.getElementById("searchStatus");

      try {
        status.className = "status";
        status.textContent = "조종사 목록 불러오는 중...";

        const result = await callApi({
          action: "getPilots"
        });

        const pilots = result.pilots || [];
        select.innerHTML = '<option value="">선택하세요</option>';

        pilots.forEach(name => {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          select.appendChild(opt);
        });

        status.className = "status ok";
        status.textContent = "조종사 목록 로드 완료";
      } catch (err) {
        select.innerHTML = '<option value="">목록 불러오기 실패</option>';
        status.className = "status err";
        status.textContent = err.message;
      }
    }

    async function searchPilot() {
      const pilotName = document.getElementById("pilotSelect").value;
      const status = document.getElementById("searchStatus");

      if (!pilotName) {
        status.className = "status err";
        status.textContent = "조종사를 선택하세요.";
        return;
      }

      try {
        document.getElementById("btnSearch").disabled = true;
        status.className = "status";
        status.textContent = "조회 중...";

        const result = await callApi({
          action: "search",
          pilotName
        });

        renderResult(result.data);
        setInputValues(result.data.inputValues || []);

        status.className = "status ok";
        status.textContent = "조회 완료";
      } catch (err) {
        status.className = "status err";
        status.textContent = err.message;
      } finally {
        document.getElementById("btnSearch").disabled = false;
      }
    }

    async function calculateData() {
      const pilotName = document.getElementById("pilotSelect").value;
      const status = document.getElementById("calcStatus");

      if (!pilotName) {
        status.className = "status err";
        status.textContent = "먼저 조종사를 선택하세요.";
        return;
      }

      try {
        document.getElementById("btnCalc").disabled = true;
        status.className = "status";
        status.textContent = "계산 중...";

        const inputValues = getInputValues();

        const result = await callApi({
          action: "calculate",
          pilotName,
          inputValues
        });

        renderResult(result.data);

        status.className = "status ok";
        status.textContent = "계산 완료";
      } catch (err) {
        status.className = "status err";
        status.textContent = err.message;
      } finally {
        document.getElementById("btnCalc").disabled = false;
      }
    }

    buildInputGrid();
    loadPilotList();
  </script>
</body>
</html>
